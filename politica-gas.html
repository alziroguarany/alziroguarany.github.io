<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Política de Privacidade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --cor-tema: #6b21a8; 
            --max-width-content: 65ch; /* Medida ideal para legibilidade (Senior Dev technique) */
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--cor-tema);
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        .app-card {
            background-color: white; 
            max-width: 800px;
            margin: 40px auto;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        .readable-content {
            max-width: var(--max-width-content);
            margin-left: auto;
            margin-right: auto;
            hyphens: auto; /* Evita buracos no texto justificado */
            word-wrap: break-word;
        }

        .titulo-item {
            color: var(--cor-tema);
            font-weight: 800;
            font-size: 1.25rem;
            margin-top: 2.5rem;
            margin-bottom: 0.75rem;
            display: block;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        .texto-corpo {
            color: #374151;
            line-height: 1.75;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            text-align: left; /* Padrão mobile para não "espalhar" */
        }

        @media (min-width: 768px) {
            .texto-corpo {
                text-align: justify; /* Justificado apenas em telas grandes */
            }
        }

        @media (max-width: 640px) {
            .app-card { 
                margin: 0; 
                border-radius: 0; 
                min-height: 100vh;
            }
            .container-padding { padding: 1.5rem; }
            .texto-corpo { font-size: 1rem; }
        }
    </style>
</head>
<body id="body-bg" class="p-0 sm:p-4">

    <div class="app-card">
        <article class="container-padding p-8 md:p-16">
            
            <header class="mb-12 border-b border-gray-100 pb-10 text-center">
                <h1 id="app-titulo-principal" class="text-3xl md:text-4xl font-extrabold tracking-tight mb-6 leading-tight" style="color: var(--cor-tema);"></h1>
                <div class="readable-content">
                    <p id="app-introducao" class="text-gray-500 text-lg md:text-xl leading-relaxed"></p>
                </div>
            </header>

            <main id="conteudo-legal" class="readable-content">
                <!-- O conteúdo processado via JS entrará aqui -->
            </main>

            <footer class="mt-16 pt-10 border-t border-gray-100">
                <div class="bg-gray-50 rounded-3xl p-8 text-center">
                    <p id="ultima-atualizacao" class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4"></p>
                    <div class="text-xs text-gray-400 leading-loose">
                        <p>© <span id="ano-atual"></span> <span id="app-footer-nome" class="font-bold text-gray-600"></span></p>
                        <p>Todos os direitos reservados.</p>
                    </div>
                </div>
            </footer>

        </article>
    </div>

    <script>
        const CONFIG = {
            tituloApp: "Política de Privacidade – Meu Gás: Controle e Duração",
            corTema: "#4c1d95", 
            dataAtualizacao: "Maio de 2026",
            nomeAppManual: "Meu Gás: Controle e Duração", 

            introducao: "Esta Política de Privacidade descreve como o aplicativo Meu Gás: Controle e Duração trata as informações dos usuários, prezando pela transparência e clareza.",

            /* 
                MODO DE USO:
                - Use # para criar um TÍTULO.
                - Escreva normalmente para criar parágrafos.
                - Mantenha a crase ` no início e no fim.
            */
            textoLegal: `
# 1. Coleta de Dados Pessoais
O desenvolvedor não coleta, não armazena e não compartilha dados pessoais dos usuários. Todas as informações inseridas no aplicativo permanecem exclusivamente no dispositivo do usuário.

# 2. Publicidade (Google AdMob)

Para possibilitar o acesso gratuito, o aplicativo exibe anúncios por meio do serviço Google AdMob.

O que é coletado: O Google AdMob pode coletar identificadores técnicos do dispositivo (como o ID de publicidade) e outros dados necessários para a exibição e personalização de anúncios.

# 3. Controle e Exclusão de Dados

Os dados inseridos no aplicativo são seus, e você pode acessá-los ou excluí-los a qualquer momento pelo próprio app.

De acordo com a Lei Geral de Proteção de Dados Pessoais (Lei nº 13.709/2018), você tem direitos sobre suas informações. Caso queira exercer esses direitos, basta entrar em contato pelo nosso canal oficial.

Armazenamento Local: Todos os dados inseridos são salvos exclusivamente no seu dispositivo móvel, garantindo a sua privacidade e autonomia.
Exclusão pelo Usuário: Você pode excluir seus registros a qualquer momento através das opções disponíveis em configurações ou nos menus internos do aplicativo.
Ao desinstalar o aplicativo, realizar a limpeza de dados ou a limpeza de cache nas configurações do sistema, as informações armazenadas localmente serão apagadas permanentemente e não poderão ser recuperadas por meio próprio do app. O gerenciamento e a exclusão dos dados ficam sob controle do próprio usuário.

No entanto, se o recurso de Backup Automático do Android estiver ativo em seu aparelho, uma cópia das informações poderá permanecer vinculada à sua conta Google na nuvem para futuras restaurações, conforme citado no item 7 deste documento.

# 4. Funcionalidades do Aplicativo

O aplicativo pode oferecer funcionalidades como compartilhamento do app e redirecionamento para avaliação na Google Play. O compartilhamento utiliza recursos nativos do dispositivo, sem coleta de dados pessoais. Ao acessar a Google Play, o usuário estará sujeito às políticas da plataforma.

# 5. Processamento de Dados
Todos os cálculos são processados localmente, sem envio de informações para servidores externos.

# 6. Tela Inicial e Documentos Legais
No primeiro acesso ao aplicativo, ou a qualquer reinstalação, é exibida a tela de Documentos Legais, contendo nossa Política de Privacidade e Termos de Uso com links diretos para visualização e leitura. Para acessar o app, o usuário precisa clicar em Entrar, confirmando assim a concordância com nossa Política de Privacidade e Termos de Uso. Ao clicar em Entrar, o aplicativo registra apenas a data, a hora e o identificador do dispositivo. Esses dados não permitem a identificação pessoal do usuário, não são enviados a servidores externos e permanecem armazenados exclusivamente no próprio dispositivo. O objetivo desse registro é garantir transparência quanto à concordância com nossa Política de Privacidade e Termos de Uso.

# 7. Backup Automático e Segurança de Dados
Para evitar que você perca suas informações ao trocar de dispositivo ou reinstalar o aplicativo, o Meu Gás: Controle e Duração utiliza o recurso nativo de Backup Automático do Sistema Android.

O aplicativo utiliza o serviço de backup automático do Android (Google Backup), sujeito a limites de armazenamento, disponibilidade e eventuais alterações de política por parte do Google. Não nos responsabilizamos pela perda de dados decorrente de limitações, falhas ou mudanças nesse serviço.

Como funciona: O aplicativo está configurado para permitir que o sistema Android realize cópias de segurança automáticas dos dados locais (banco de dados).

Destino dos dados: Essas cópias são enviadas para a nuvem do Google, vinculada à sua Conta Google pessoal. Os dados são armazenados de forma privada em uma área de backup do Google Drive, não sendo acessíveis por terceiros ou pelo desenvolvedor do aplicativo.

Restauração: Ao reinstalar o aplicativo ou configurar um novo dispositivo com a mesma conta Google, o sistema Android restaurará automaticamente suas informações.

Requisitos e Limitações: O funcionamento deste recurso depende de:
A opção "Backup" estar ativada nas configurações do seu dispositivo Android.
Conexão ativa com a internet (preferencialmente Wi-Fi).
Estar logado em uma Conta Google válida.

Embora o recurso utilize a infraestrutura de segurança do Google, recomendamos que o usuário mantenha as configurações de backup do sistema sempre ativas, ciente de que o processo é gerenciado inteiramente pelo sistema operacional Android e pelos serviços do Google.

# 8. Atualizações da Política de Privacidade
Esta Política de Privacidade pode ser atualizada a qualquer momento para refletir melhorias ou mudanças no aplicativo. Recomendamos que o usuário consulte regularmente esta seção, a fim de estar sempre informado sobre eventuais alterações.


# 9. Legislação e Foro
Este termo é regido pela legislação brasileira.
Todas as questões, litígios ou reclamações relacionadas à interpretação, execução ou uso do aplicativo serão solucionados perante o Foro da Comarca de Itaboraí/RJ, eleito pelas partes como competente, mesmo que haja outro mais privilegiado, observadas as disposições legais aplicáveis ao consumidor.


# 10. Contato
Caso tenha qualquer dúvida sobre esta política ou sobre o funcionamento do aplicativo, entre em contato pelo canal oficial:

E-mail de Contato: suporte.agneonpower@gmail.com

Responsável: Alziro Guarany
            `
        };

        function renderizarPolitica() {
            document.documentElement.style.setProperty('--cor-tema', CONFIG.corTema);
            document.getElementById('body-bg').style.backgroundColor = CONFIG.corTema;

            const partesTitulo = CONFIG.tituloApp.split(' – ');
            const nomeExtraido = partesTitulo.length > 1 ? partesTitulo[1] : CONFIG.tituloApp;
            const nomeFinalApp = CONFIG.nomeAppManual.trim() !== "" ? CONFIG.nomeAppManual : nomeExtraido;

            document.getElementById('app-titulo-principal').innerText = CONFIG.tituloApp;
            document.getElementById('app-introducao').innerText = CONFIG.introducao;
            document.getElementById('app-footer-nome').innerText = nomeFinalApp;
            document.getElementById('ultima-atualizacao').innerText = "Última atualização: " + CONFIG.dataAtualizacao;
            document.getElementById('ano-atual').innerText = new Date().getFullYear();

            const main = document.getElementById('conteudo-legal');
            const linhas = CONFIG.textoLegal.trim().split('\n');
            let htmlFinal = "";

            linhas.forEach(linha => {
                let textoLimpo = linha.trim();
                if (textoLimpo.startsWith('#')) {
                    let titulo = textoLimpo.replace('#', '').trim();
                    htmlFinal += `<span class="titulo-item">${titulo}</span>`;
                } else if (textoLimpo !== "") {
                    htmlFinal += `<p class="texto-corpo">${textoLimpo}</p>`;
                }
            });

            main.innerHTML = htmlFinal;
        }

        window.onload = renderizarPolitica;
    </script>
</body>
</html>
